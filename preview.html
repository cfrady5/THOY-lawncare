<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Lawncare character — SVG preview</title>
<style>
  :root { --size: 520px; }
  * { box-sizing: border-box; }
  body { margin: 0; font: 15px/1.5 system-ui, sans-serif; color: #222; background: #fafafa; }
  header { padding: 18px 24px; border-bottom: 1px solid #e5e5e5; display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
  h1 { font-size: 18px; margin: 0; }
  .controls { display: flex; gap: 14px; align-items: center; margin-left: auto; }
  input[type=range] { width: 220px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 1px; background: #e5e5e5; }
  .panel { padding: 28px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .label { font-weight: 600; font-size: 13px; letter-spacing: .04em; text-transform: uppercase; color: #666; }
  .stage { width: var(--size); max-width: 100%; aspect-ratio: 16/9; display: grid; place-items: center; border-radius: 10px; }
  .stage img { width: 100%; height: 100%; object-fit: contain; }
  .bg-checker { background-color: #fff; background-image:
      linear-gradient(45deg,#ccc 25%,transparent 25%),linear-gradient(-45deg,#ccc 25%,transparent 25%),
      linear-gradient(45deg,transparent 75%,#ccc 75%),linear-gradient(-45deg,transparent 75%,#ccc 75%);
    background-size: 24px 24px; background-position: 0 0,0 12px,12px -12px,-12px 0; }
  .bg-black { background: #0a0a0a; }
  .bg-white { background: #ffffff; box-shadow: inset 0 0 0 1px #eee; }
  .bg-scene { background: linear-gradient(#bfe6fb, #d9f0fb 55%, #6ec06a 55%, #4f9e4b); }
</style>
</head>
<body>
  <header>
    <h1>lawncare-character.svg — preview</h1>
    <div class="controls">
      <label>Size <input id="size" type="range" min="200" max="900" value="520" /></label>
    </div>
  </header>
  <div class="grid">
    <div class="panel"><span class="label">Transparent (checkerboard)</span><div class="stage bg-checker"><img src="lawncare-character.svg" alt="" /></div></div>
    <div class="panel"><span class="label">Black</span><div class="stage bg-black"><img src="lawncare-character.svg" alt="" /></div></div>
    <div class="panel"><span class="label">White</span><div class="stage bg-white"><img src="lawncare-character.svg" alt="" /></div></div>
    <div class="panel"><span class="label">On a scene</span><div class="stage bg-scene"><img src="lawncare-character.svg" alt="" /></div></div>
  </div>
  <script>
    const r = document.getElementById('size');
    r.addEventListener('input', () => document.documentElement.style.setProperty('--size', r.value + 'px'));
  </script>
</body>
</html>
